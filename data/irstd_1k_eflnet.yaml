# COCO 2017 dataset http://cocodataset.org

# train and val data as 1) directory: path/images/, 2) file: path/images.txt, or 3) list: [path1/images/, path2/images/]
train: './data/datasets/IRSTD_train_EFLNet.txt'  # 118287 images train_EFLNetfrugal
val: './data/datasets/IRSTD_val_EFLNet.txt'  # 5000 images val_EFLNetfrugal
test: './data/datasets/IRSTD_test_EFLNet.txt'  # 20288 of 40670 images, submit to https://competitions.codalab.org/competitions/20794 val_yolofrugal

# number of classes
nc: 1

# class names
names: [ 'target']