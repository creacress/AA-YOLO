# COCO 2017 dataset http://cocodataset.org

# train and val data as 1) directory: path/images/, 2) file: path/images.txt, or 3) list: [path1/images/, path2/images/]
train: ./data/datasets/train_yolo.txt  # 118287 images train_yolofrugal
val: ./data/datasets/val_yolo.txt  # 5000 images val_yolofrugal
test: ./data/datasets/test_yolo.txt  # 20288 of 40670 images, submit to https://competitions.codalab.org/competitions/20794 val_yolofrugal

# number of classes
nc: 1

# class names
names: [ 'target']
